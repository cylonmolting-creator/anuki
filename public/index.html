<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anuki — The Agent Civilization</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Cpath d='M8,40 Q24,18 40,18 Q56,18 72,40 Q56,62 40,62 Q24,62 8,40 Z' fill='none' stroke='%23c9a84c' stroke-width='2'/%3E%3Ccircle cx='40' cy='40' r='13' fill='%23c9a84c'/%3E%3Ccircle cx='40' cy='40' r='6' fill='%230a0a0f'/%3E%3Ccircle cx='43' cy='37' r='2' fill='%23f0e6c0' opacity='0.9'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a25;
      --surface-elevated: #16161f;
      --border: rgba(201,168,76,0.12);
      --border-strong: rgba(201,168,76,0.25);
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #c9a84c;
      --accent-hover: #d4b85c;
      --accent-dim: #8B6914;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --gold: #c9a84c;
      --gold-light: #e6c670;
      --gold-dark: #8B6914;
      --gold-glow: rgba(201,168,76,0.15);
      --gold-glow-strong: rgba(201,168,76,0.3);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
      --shadow-gold: 0 0 20px rgba(201,168,76,0.1);
      --sidebar-w: 260px;
      --header-h: 56px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      background: linear-gradient(180deg, #14141e 0%, var(--surface) 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.3);
    }

    .sidebar-header {
      padding: 20px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 100%);
    }

    .sidebar-header .brand-logo {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.4));
      transition: filter 0.3s;
    }

    .sidebar-header .brand-logo:hover {
      filter: drop-shadow(0 0 14px rgba(201,168,76,0.6));
    }

    .sidebar-header .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }

    .sidebar-header .tagline {
      font-size: 9px;
      color: var(--gold-dark);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sidebar-header .version {
      font-size: 10px;
      color: var(--gold-dark);
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.12);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: auto;
    }

    .sidebar-section {
      padding: 12px 12px 8px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 8px 8px;
    }

    .agent-list {
      list-style: none;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }

    .agent-item:hover {
      background: rgba(201,168,76,0.06);
      border-color: rgba(201,168,76,0.1);
    }

    .agent-item.active {
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border-strong);
      box-shadow: 0 0 12px rgba(201,168,76,0.08), inset 0 0 12px rgba(201,168,76,0.03);
    }

    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
      animation: pulse-dot 3s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px currentColor; }
      50% { opacity: 0.7; box-shadow: 0 0 10px currentColor; }
    }

    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }

    .agent-role {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--border);
      background: linear-gradient(0deg, rgba(201,168,76,0.03) 0%, transparent 100%);
    }

    .settings-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-size: 13px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      background: rgba(201,168,76,0.06);
      color: var(--gold-light);
      border-color: rgba(201,168,76,0.1);
    }

    /* Main Chat Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      height: var(--header-h);
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-elevated) 100%);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .chat-header .agent-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
    }

    .chat-header .status {
      font-size: 12px;
      color: var(--success);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.03) 0%, transparent 70%);
    }

    .message {
      max-width: 720px;
      line-height: 1.6;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: #0a0a0f;
      font-weight: 500;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 12px rgba(201,168,76,0.25), 0 0 20px rgba(201,168,76,0.08);
    }

    .message.assistant {
      align-self: flex-start;
      background: linear-gradient(135deg, var(--surface-elevated) 0%, var(--surface) 100%);
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .message.system {
      align-self: center;
      color: var(--text-dim);
      font-size: 13px;
      font-style: italic;
    }

    .message .agent-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .message pre {
      background: rgba(0,0,0,0.4);
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(201,168,76,0.08);
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }

    .message code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .welcome {
      text-align: center;
      padding: 80px 24px 60px;
      color: var(--text-dim);
    }

    .welcome h2 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      text-shadow: none;
    }

    .welcome p {
      font-size: 15px;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
      color: var(--text-dim);
    }

    /* Input Area */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: linear-gradient(0deg, var(--surface) 0%, var(--surface-elevated) 100%);
    }

    .input-container {
      display: flex;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
    }

    .input-container textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid rgba(201,168,76,0.12);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 200px;
      outline: none;
      transition: all 0.25s ease;
    }

    .input-container textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1), 0 0 20px rgba(201,168,76,0.06);
    }

    .input-container textarea::placeholder {
      color: var(--text-dim);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      border: none;
      border-radius: 14px;
      color: #0a0a0f;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
      align-self: flex-end;
      box-shadow: 0 2px 8px rgba(201,168,76,0.3);
    }

    .send-btn:hover {
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
      box-shadow: 0 4px 16px rgba(201,168,76,0.4);
      transform: translateY(-1px);
    }

    .send-btn:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(201,168,76,0.3);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Settings Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
      box-shadow: var(--shadow-lg), 0 0 40px rgba(201,168,76,0.06);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .form-group input, .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .modal-actions button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }

    .btn-cancel {
      background: var(--surface-hover);
      color: var(--text);
    }

    .btn-save {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: #0a0a0f;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(201,168,76,0.25);
    }

    /* Loading / progress indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--surface-elevated) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
      color: var(--gold);
      font-size: 14px;
      box-shadow: var(--shadow-sm);
      max-width: 400px;
    }

    .typing-indicator.active {
      display: block;
    }

    .typing-status {
      font-weight: 600;
    }

    .typing-detail {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      opacity: 0.8;
    }

    .typing-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.15); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.3); }

    /* Mobile menu button */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      margin-right: 0.5rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; position: fixed; z-index: 100; top: 0; left: 0; bottom: 0; width: 260px; }
      .sidebar.open { display: flex; }
      .mobile-menu-btn { display: block; }
      .chat-header { position: relative; z-index: 101; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg class="brand-logo" viewBox="0 0 80 80" width="32" height="32">
          <path d="M8,40 Q24,18 40,18 Q56,18 72,40 Q56,62 40,62 Q24,62 8,40 Z" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
          <circle cx="40" cy="40" r="13" fill="#c9a84c"/>
          <circle cx="40" cy="40" r="6" fill="#0a0a0f"/>
          <circle cx="40" cy="40" r="3" fill="#8B6914" opacity="0.5"/>
          <circle cx="43" cy="37" r="2" fill="#f0e6c0" opacity="0.8"/>
          <path d="M20,22 Q30,16 40,16 Q50,16 60,22" fill="none" stroke="#d4a847" stroke-width="0.8" opacity="0.5"/>
          <path d="M20,58 Q30,64 40,64 Q50,64 60,58" fill="none" stroke="#d4a847" stroke-width="0.8" opacity="0.5"/>
        </svg>
        <div class="brand-text">
          <h1>Anuki</h1>
          <span class="tagline">The Agent Civilization</span>
        </div>
        <span class="version">v0.1</span>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Agents</div>
        <ul class="agent-list" id="agentList">
          <!-- Populated dynamically -->
        </ul>
      </div>

      <div class="sidebar-footer">
        <button class="settings-btn" onclick="openSettings()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/></svg>
          Settings
        </button>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="main">
      <div class="chat-header">
        <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
        <div class="agent-dot" id="headerDot" style="background: var(--accent)"></div>
        <span class="agent-name" id="headerName">PROTOS</span>
        <span class="status" id="headerStatus">online</span>
      </div>

      <div class="messages" id="messages">
        <div class="welcome">
          <h2>Welcome to Anuki</h2>
          <p>The Agent Civilization awaits. Talk to an agent to get started, or switch agents in the sidebar.</p>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-status"><span class="typing-dots">Thinking</span></div>
        <div class="typing-detail" id="typingDetail"></div>
        <div class="progress-bar" id="progressBar" style="display:none">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-container">
          <textarea
            id="messageInput"
            placeholder="Type a message..."
            rows="1"
            onkeydown="handleKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>Settings</h2>
      <div class="form-group">
        <label>API Key (BYOK)</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." />
      </div>
      <div class="form-group">
        <label>Default Model</label>
        <select id="defaultModel">
          <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        </select>
      </div>
      <div class="form-group">
        <label>Claude CLI Path</label>
        <input type="text" id="claudePath" placeholder="claude (auto-detect)" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════════════════
    let ws = null;
    let currentAgent = null;
    let agents = [];
    let conversationId = null;

    const agentColors = {};  // All agents use gold accent by default

    // ═══════════════════════════════════════════════════════
    // Init
    // ═══════════════════════════════════════════════════════
    async function init() {
      await loadAgents();
      connectWebSocket();
    }

    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        const data = await res.json();
        agents = data.agents || data;
        renderAgentList();
        // Select default agent
        const defaultAgent = agents.find(a => a.isDefault) || agents[0];
        if (defaultAgent) selectAgent(defaultAgent.id);
      } catch (e) {
        console.error('Failed to load agents:', e);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderAgentList() {
      const list = document.getElementById('agentList');
      list.innerHTML = '';
      agents.forEach(a => {
        const li = document.createElement('li');
        li.className = `agent-item ${currentAgent === a.id ? 'active' : ''}`;
        li.dataset.agent = a.id;
        li.onclick = () => selectAgent(a.id);
        const dot = document.createElement('div');
        dot.className = 'agent-dot';
        dot.style.background = agentColors[a.name] || 'var(--accent)';
        const info = document.createElement('div');
        info.className = 'agent-info';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'agent-name';
        nameDiv.textContent = a.name;
        const roleDiv = document.createElement('div');
        roleDiv.className = 'agent-role';
        roleDiv.textContent = a.description || a.name;
        info.appendChild(nameDiv);
        info.appendChild(roleDiv);
        li.appendChild(dot);
        li.appendChild(info);
        list.appendChild(li);
      });
    }

    function selectAgent(id) {
      currentAgent = id;
      const agent = agents.find(a => a.id === id);
      if (!agent) return;

      // Close mobile sidebar
      document.querySelector('.sidebar').classList.remove('open');

      // Update header
      document.getElementById('headerName').textContent = agent.name;
      document.getElementById('headerDot').style.background = agentColors[agent.name] || 'var(--accent)';

      // Update sidebar selection
      document.querySelectorAll('.agent-item').forEach(el => {
        el.classList.toggle('active', el.dataset.agent === id);
      });

      // Clear messages for new agent (safe DOM construction)
      const messages = document.getElementById('messages');
      messages.innerHTML = '';
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      const h2 = document.createElement('h2');
      h2.textContent = agent.name;
      const p = document.createElement('p');
      p.textContent = agent.description || 'Ready to help.';
      welcome.appendChild(h2);
      welcome.appendChild(p);
      messages.appendChild(welcome);

      // New conversation
      conversationId = `conv-${Date.now()}`;

      // Notify server of workspace selection
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'select-workspace', workspaceId: id, conversationId: conversationId }));
      }
    }

    // ═══════════════════════════════════════════════════════
    // WebSocket
    // ═══════════════════════════════════════════════════════
    let wsReconnectDelay = 1000;
    let wsReconnectAttempts = 0;
    let streamingBuffer = '';
    // Fast-poll window: when server sends 'reload' (safe-restart), client enters
    // aggressive retry mode for 15 seconds (poll every 800ms) instead of the
    // slow exponential backoff. Covers typical safe-restart downtime (~8s).
    let _fastPollWindowEnd = 0;

    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        console.log('WebSocket connected');
        document.getElementById('headerStatus').textContent = 'online';
        wsReconnectDelay = 1000;
        wsReconnectAttempts = 0;

        // Send workspace selection on connect
        if (currentAgent) {
          ws.send(JSON.stringify({ type: 'select-workspace', workspaceId: currentAgent, conversationId: conversationId }));
        }
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleWSMessage(data);
        } catch (e) {
          console.error('WS parse error:', e);
        }
      };

      ws.onclose = () => {
        wsReconnectAttempts++;
        if (wsReconnectAttempts > 50) {
          document.getElementById('headerStatus').textContent = 'offline';
          return;
        }
        const inFastPoll = Date.now() < _fastPollWindowEnd;
        if (inFastPoll) {
          document.getElementById('headerStatus').textContent = 'server restarting...';
          setTimeout(connectWebSocket, 800);
        } else {
          document.getElementById('headerStatus').textContent = 'reconnecting...';
          wsReconnectDelay = Math.min(wsReconnectDelay * 1.6, 8000);
          setTimeout(connectWebSocket, wsReconnectDelay);
        }
      };

      ws.onerror = (e) => {
        console.error('WS error:', e);
      };
    }

    function handleWSMessage(data) {
      switch (data.type) {
        case 'connected':
          // Server acknowledged connection
          break;

        case 'text':
        case 'system':
          // Streaming text chunk — accumulate and show
          showTyping();
          streamingBuffer += (data.content || data.text || '');
          updateStreamingMessage(streamingBuffer, data.agentName);
          break;

        case 'complete':
          // Final response — replace streaming buffer with complete content
          hideTyping();
          if (data.content || streamingBuffer) {
            finalizeStreamingMessage(data.content || streamingBuffer, data.agentName);
          }
          streamingBuffer = '';
          break;

        case 'done':
          hideTyping();
          if (streamingBuffer) {
            finalizeStreamingMessage(streamingBuffer, data.agentName);
            streamingBuffer = '';
          }
          break;

        case 'error':
          hideTyping();
          streamingBuffer = '';
          addMessage('system', 'Error: ' + (data.content || data.message || 'Unknown error'));
          break;

        case 'progress':
          // Live progress from agent execution
          showTyping();
          updateProgress(data);
          break;

        case 'tool_start':
          // Agent started using a tool
          showTyping();
          updateToolStatus(data.tool || data.name, 'running');
          break;

        case 'tool_result':
          // Agent tool completed
          updateToolStatus(data.tool || data.name, 'done');
          break;

        case 'message-received':
        case 'message-queued':
          // Acknowledgements — show typing
          showTyping();
          break;

        case 'agent-status':
          // Agent status update (running, idle, etc.)
          break;

        case 'conversationSync':
          // Sync conversation state
          if (data.conversationId) conversationId = data.conversationId;
          break;

        case 'ping':
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'pong' }));
          }
          break;

        case 'reload':
          // Server restarted — arm fast-poll window (15s of 800ms retries)
          // and reconnect quickly. Prior 2000ms fixed delay would usually hit
          // a still-booting server and then fall into slow backoff.
          _fastPollWindowEnd = Date.now() + 15000;
          if (ws) { try { ws.onclose = null; ws.close(); } catch(e) {} ws = null; }
          wsReconnectAttempts = 0;
          wsReconnectDelay = 1000;
          setTimeout(connectWebSocket, 400);
          break;

        case 'resume-active':
        case 'pending-completion':
          // Resume scenarios — show the content if present
          if (data.content) {
            addMessage('assistant', data.content, data.agentName);
          }
          break;

        case 'cancelled':
          hideTyping();
          streamingBuffer = '';
          break;

        default:
          // Legacy support: assistant/response types
          if (data.type === 'assistant' || data.type === 'response') {
            hideTyping();
            addMessage('assistant', data.content, data.agentName);
          }
          break;
      }
    }

    function updateStreamingMessage(content, agentName) {
      const messages = document.getElementById('messages');
      let streamEl = messages.querySelector('.message.streaming');
      if (!streamEl) {
        streamEl = document.createElement('div');
        streamEl.className = 'message assistant streaming';
        messages.appendChild(streamEl);
      }
      if (agentName) {
        const label = streamEl.querySelector('.agent-label') ? '' : `<div class="agent-label">${escapeHtml(agentName)}</div>`;
        streamEl.innerHTML = label + formatContent(content);
      } else {
        streamEl.innerHTML = formatContent(content);
      }
      messages.scrollTop = messages.scrollHeight;
    }

    function finalizeStreamingMessage(content, agentName) {
      const messages = document.getElementById('messages');
      const streamEl = messages.querySelector('.message.streaming');
      if (streamEl) {
        streamEl.classList.remove('streaming');
        if (agentName) {
          streamEl.innerHTML = `<div class="agent-label">${escapeHtml(agentName)}</div>` + formatContent(content);
        } else {
          streamEl.innerHTML = formatContent(content);
        }
      } else {
        addMessage('assistant', content, agentName);
      }
      messages.scrollTop = messages.scrollHeight;
    }

    // ═══════════════════════════════════════════════════════
    // Messages
    // ═══════════════════════════════════════════════════════
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentAgent) return;

      // Remove welcome screen
      const welcome = document.querySelector('.welcome');
      if (welcome) welcome.remove();

      addMessage('user', text);
      input.value = '';
      autoResize(input);
      showTyping();

      // Send via WebSocket
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'message',
          content: text,
          workspaceId: currentAgent,
          conversationId: conversationId,
          channel: 'webchat'
        }));
      }
    }

    function addMessage(type, content, agentName) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${type}`;

      if (type === 'user' || type === 'system') {
        // User and system messages — plain text, no HTML
        div.textContent = content || '';
      } else if (type === 'assistant' && agentName) {
        div.innerHTML = `<div class="agent-label">${escapeHtml(agentName)}</div>` + formatContent(content);
      } else {
        div.innerHTML = formatContent(content);
      }

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function formatContent(text) {
      if (!text) return '';
      // Escape HTML first to prevent XSS, then apply safe markdown
      let safe = escapeHtml(text);
      return safe
        .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      document.getElementById('typingIndicator').classList.add('active');
    }

    function hideTyping() {
      document.getElementById('typingIndicator').classList.remove('active');
      // Reset progress state
      const detail = document.getElementById('typingDetail');
      const bar = document.getElementById('progressBar');
      const fill = document.getElementById('progressFill');
      const status = document.querySelector('.typing-status');
      if (detail) detail.textContent = '';
      if (bar) bar.style.display = 'none';
      if (fill) fill.style.width = '0%';
      if (status) status.innerHTML = '<span class="typing-dots">Thinking</span>';
    }

    function updateProgress(data) {
      const status = document.querySelector('.typing-status');
      const detail = document.getElementById('typingDetail');
      const bar = document.getElementById('progressBar');
      const fill = document.getElementById('progressFill');

      // Update status text
      if (data.currentTool) {
        status.textContent = toolDisplayName(data.currentTool);
      } else if (data.turn) {
        status.innerHTML = '<span class="typing-dots">Working</span>';
      }

      // Update detail line
      const parts = [];
      if (data.turn) parts.push('Turn ' + data.turn + '/' + (data.maxTurns || '?'));
      if (data.elapsedMs) parts.push(formatElapsed(data.elapsedMs));
      if (data.currentTool) parts.push(toolDisplayName(data.currentTool));
      if (parts.length) detail.textContent = parts.join(' · ');

      // Update progress bar
      if (data.percentage > 0) {
        bar.style.display = 'block';
        fill.style.width = Math.min(data.percentage, 99) + '%';
      }
    }

    function updateToolStatus(toolName, state) {
      const status = document.querySelector('.typing-status');
      const detail = document.getElementById('typingDetail');
      if (state === 'running' && toolName) {
        status.textContent = toolDisplayName(toolName);
        detail.textContent = 'Using ' + toolDisplayName(toolName);
      }
    }

    function toolDisplayName(name) {
      const map = {
        'Read': 'Reading file',
        'Write': 'Writing file',
        'Edit': 'Editing file',
        'Bash': 'Running command',
        'Glob': 'Searching files',
        'Grep': 'Searching code',
        'WebFetch': 'Fetching web content',
        'WebSearch': 'Searching the web',
        'TodoWrite': 'Planning',
        'Task': 'Delegating task',
      };
      return map[name] || name;
    }

    function formatElapsed(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
    }

    // ═══════════════════════════════════════════════════════
    // Input
    // ═══════════════════════════════════════════════════════
    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    // ═══════════════════════════════════════════════════════
    // Settings
    // ═══════════════════════════════════════════════════════
    function openSettings() {
      document.getElementById('settingsModal').classList.add('active');
      // Load current settings
      fetch('/api/config').then(r => r.json()).then(config => {
        document.getElementById('defaultModel').value = config.agent?.model || '';
        document.getElementById('claudePath').value = config.agent?.claudePath || '';
      }).catch(() => {});
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('active');
    }

    function saveSettings() {
      const apiKey = document.getElementById('apiKey').value;
      if (apiKey) {
        // Store locally — don't send to server
        localStorage.setItem('anuki_api_key', apiKey);
      }
      closeSettings();
    }

    // Close modal on overlay click
    document.getElementById('settingsModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSettings();
    });

    // Start
    init();
  </script>
</body>
</html>
